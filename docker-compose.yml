# docker-compose.yml (updated)
services:
  frontend:
    build: ./frontend
    ports:
      - "3002:80"
    depends_on:
      - backend

  backend:
  build: ./backend
  ports:
    - "5003:5000"
  environment:
    - MONGODB_URI=mongodb://mongo:27017/mydatabase
  depends_on:
    - mongo


  mongo:
    image: mongo:6.0
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
