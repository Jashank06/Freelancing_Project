version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3002:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "5002:5000"
    environment:
      MONGODB_URI: mongodb://mongo:27017/mydatabase
    depends_on:
      - mongo

  mongo:
    image: mongo:6.0
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
